# Server
server.port=8080

# Database - PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/ecofocus
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=EcoFocusSecretKey2024VeryLongSecretKeyForJWTSigning123456789
app.jwt.expiration-ms=900000

# Resend Email
resend.api.key=${RESEND_API_KEY}
resend.from=onboarding@resend.dev

# Logging
logging.level.com.ecofocus=DEBUG
